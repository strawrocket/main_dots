# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Windows Rules https://wiki.hyprland.org/Configuring/Window-Rules/ #


########################
# Floating dialogs
########################

windowrulev2 = float, class:^(org\.pulseaudio\.pavucontrol)$
windowrulev2 = float, title:^(Picture in picture)$
windowrulev2 = float, title:^(Save File)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, class:^(LibreWolf)$, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland).*$

windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org\.kde\.polkit-kde-authentication-agent-1).*$

windowrulev2 = float, class:^(CachyOSHello)$
windowrulev2 = float, class:^(zenity)$
windowrulev2 = float, title:^(Steam - Self Updater)$

########################
# Thunar dialogs
########################

windowrulev2 = float, class:^(thunar)$, title:^(Rename .*)$
windowrulev2 = center, class:^(thunar)$, title:^(Rename .*)$
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)$
windowrulev2 = float, class:^(thunar)$, title:^(Confirm)$

########################
# Opacity
########################

windowrulev2 = opacity 0.92, class:^(thunar|nemo)$
windowrulev2 = opacity 0.96, class:^(discord|armcord|webcord)$
windowrulev2 = opacity 0.95, title:^(QQ|Telegram)$
windowrulev2 = opacity 0.95, title:^(NetEase Cloud Music Gtk4)$

########################
# Picture-in-Picture
########################

windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = size 960 540, title:^(Picture-in-Picture)$
windowrulev2 = move 25% 25%, title:^(Picture-in-Picture)$

########################
# Media / utility floaters
########################

windowrulev2 = float, title:^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrulev2 = move 25% 25%, title:^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrulev2 = size 960 540, title:^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$

windowrulev2 = pin, title:^(danmufloat)$
windowrulev2 = rounding 5, title:^(danmufloat|termfloat)$

########################
# App-specific tweaks
########################

windowrulev2 = animation slide right, class:^(kitty|Alacritty)$
windowrulev2 = noblur, class:^(org\.mozilla\.firefox)$

########################
# Decorations
########################

windowrulev2 = bordersize 2, floating:1, onworkspace:w[t1-10]
windowrulev2 = bordercolor $cachylblue $cachylblue, floating:1, onworkspace:w[t1-10]
windowrulev2 = rounding 8, floating:1, onworkspace:w[t1-10]

windowrulev2 = bordersize 3, floating:0, onworkspace:f[1-10]
windowrulev2 = rounding 4, floating:0, onworkspace:f[1-10]

########################
# Special cases
########################

windowrulev2 = stayfocused, class:^(PrusaSlicer)$

# Workspaces Rules https://wiki.hyprland.org/Configuring/Workspace-Rules/ #
# workspace = 1, default:true, monitor:$priMon
# workspace = 6, default:true, monitor:$secMon
# Workspace selectors https://wiki.hyprland.org/Configuring/Workspace-Rules/#workspace-selectors
# workspace = r[1-5], monitor:$priMon
# workspace = r[6-10], monitor:$secMon
# workspace = special:scratchpad, on-created-empty:[alacritty]
# no_gaps_when_only deprecated instead workspaces rules with selectors can do the same
# Smart gaps https://wiki.hyprland.org/Configuring/Workspace-Rules/#smart-gaps
workspace = w[t1-10], gapsout:5, gapsin:3
workspace = f[1], gapsout:5, gapsin:3
# Workspaces Rules End #

# Layers Rules #
# layerrule = animation slide top, logout
# layerrule = animation slide down, waybar
# layerrule = animation fade 50%, wallpaper
# Layers Rules End #
